<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Campus Help Desk — Admin Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1C2B3A;
    --ink-light: #5B6B7C;
    --paper: #FBF7EE;
    --paper-dark: #F0E8D6;
    --line: #D8CFB8;
    --rust: #BF4E2C;
    --amber: #B8780F;
    --sage: #4F7858;
  }

  body {
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    background: var(--paper-dark);
    min-height: 100vh;
  }

  .font-display { font-family: 'Fraunces', serif; }
  .font-mono    { font-family: 'IBM Plex Mono', monospace; }

  .stamp {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 12px;
    border: 2px solid currentColor;
    border-radius: 999px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transform: rotate(-3deg);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .stamp-open    { color: var(--rust);  background: rgba(191,78,44,0.08); }
  .stamp-progress{ color: var(--amber); background: rgba(184,120,15,0.10); }
  .stamp-resolved{ color: var(--sage);  background: rgba(79,120,88,0.10); }

  .ticket-stub { position: relative; border-top: 2px dashed var(--line); }
  .ticket-stub::before, .ticket-stub::after {
    content: ''; position: absolute; top: -8px; width: 16px; height: 16px;
    border-radius: 50%; background: var(--paper-dark);
  }
  .ticket-stub::before { left: -1px; }
  .ticket-stub::after  { right: -1px; }

  header {
    padding: 20px 24px;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--ink); color: var(--paper);
  }
  header .title { font-family: 'Fraunces', serif; font-size: 20px; }
  .btn-logout {
    display: flex; align-items: center; gap: 6px;
    font-size: 14px; padding: 6px 12px; border-radius: 8px;
    background: rgba(251,247,238,0.12); color: var(--paper);
    border: none; cursor: pointer; font-family: inherit; transition: opacity .15s;
  }
  .btn-logout:hover { opacity: 0.8; }

  .btn-primary {
    padding: 10px 20px;
    background: var(--ink); color: var(--paper);
    border: none; border-radius: 8px;
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity .15s, transform .15s;
  }
  .btn-primary:hover  { opacity: 0.85; }
  .btn-primary:active { transform: scale(0.98); }

  input, select, textarea {
    background: var(--paper-dark);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--ink);
    font-family: inherit;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color .15s;
    width: 100%;
  }
  input:focus, select:focus { border-color: var(--ink); }
  input::placeholder { color: var(--ink-light); opacity: 0.6; }

  label.field-label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--ink-light); margin-bottom: 6px;
  }
  .field { margin-bottom: 0; }

  /* Auth */
  .auth-wrap {
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center; padding: 24px;
  }
  .auth-box { width: 100%; max-width: 400px; }
  .auth-header { text-align: center; margin-bottom: 28px; }
  .auth-header h1 { font-family: 'Fraunces', serif; font-size: 32px; margin-top: 12px; }
  .auth-header p  { font-size: 14px; color: var(--ink-light); margin-top: 8px; }
  .auth-panel {
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 16px; padding: 28px;
  }
  .error-msg { font-size: 13px; color: var(--rust); margin: 10px 0; }
  .btn-primary-full { width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; }
  .hidden { display: none !important; }

  /* Dashboard */
  main { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 16px; margin-bottom: 32px;
  }
  .stat-card {
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 16px; padding: 20px;
  }
  .stat-card .val {
    font-family: 'Fraunces', serif; font-size: 32px;
  }
  .stat-card .lbl {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--ink-light); margin-top: 4px;
  }

  .controls {
    display: flex; flex-wrap: wrap; gap: 12px;
    align-items: center; margin-bottom: 24px;
  }
  .filter-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn {
    padding: 8px 16px; border-radius: 999px; font-size: 14px;
    font-family: inherit; font-weight: 500; border: 1px solid var(--line);
    cursor: pointer; transition: background .15s, color .15s;
  }
  .filter-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .filter-btn:not(.active) { background: var(--paper); color: var(--ink-light); }

  .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 320px; margin-left: auto; }
  .search-wrap input { padding-left: 36px; }
  .search-wrap .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--ink-light); pointer-events: none; font-size: 15px;
  }

  .ticket-row {
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 16px; overflow: hidden; margin-bottom: 12px;
  }
  .ticket-toggle {
    width: 100%; text-align: left;
    padding: 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    background: transparent; border: none; cursor: pointer; font-family: inherit;
  }
  .ticket-toggle .info-grid {
    display: grid; gap: 4px; flex: 1; min-width: 0;
  }
  @media(min-width: 600px){
    .ticket-toggle .info-grid { grid-template-columns: 110px 1fr; align-items: baseline; gap: 16px; }
  }
  .ticket-toggle .roll-no { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--ink-light); }
  .ticket-toggle .subj { font-size: 15px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ticket-toggle .sub-meta { font-size: 12px; color: var(--ink-light); margin-top: 2px; }

  .ticket-body {
    padding: 0 20px 20px; padding-top: 16px;
  }
  .ticket-body .desc { font-size: 14px; white-space: pre-wrap; margin-bottom: 16px; }
  .edit-grid {
    display: grid; gap: 16px;
  }
  @media(min-width: 600px){ .edit-grid { grid-template-columns: 1fr 1fr; } }
  .edit-actions { display: flex; align-items: center; gap: 12px; margin-top: 16px; }
  .saved-msg { font-size: 13px; color: var(--sage); }

  .empty-state {
    background: var(--paper); border: 1px dashed var(--line);
    border-radius: 16px; padding: 48px; text-align: center;
    color: var(--ink-light); font-size: 14px;
  }

  .stamp-header { color: var(--amber); background: rgba(184,120,15,0.10); transform: none; }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen" class="auth-wrap">
  <div class="auth-box">
    <div class="auth-header">
      <span class="stamp stamp-header">🛡 Admin Access</span>
      <h1 class="font-display">Campus Help Desk</h1>
      <p>Enter your admin PIN to manage tickets and update statuses.</p>
    </div>
    <div class="auth-panel">
      <div class="field" style="margin-bottom:16px">
        <label class="field-label">Admin PIN</label>
        <input id="pin-input" type="password" placeholder="Enter PIN" onkeydown="if(event.key==='Enter')submitPin()" />
      </div>
      <div id="pin-error" class="error-msg hidden"></div>
      <button class="btn-primary btn-primary-full" onclick="submitPin()">Enter dashboard →</button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="admin-screen" class="hidden">
  <header>
    <div class="title font-display">Campus Help Desk · Admin</div>
    <button class="btn-logout" onclick="logout()">↩ Log out</button>
  </header>

  <main>
    <div class="stats-grid">
      <div class="stat-card"><div class="val font-display" id="cnt-all" style="color:var(--ink)">0</div><div class="lbl">Total</div></div>
      <div class="stat-card"><div class="val font-display" id="cnt-open" style="color:var(--rust)">0</div><div class="lbl">Open</div></div>
      <div class="stat-card"><div class="val font-display" id="cnt-prog" style="color:var(--amber)">0</div><div class="lbl">In Progress</div></div>
      <div class="stat-card"><div class="val font-display" id="cnt-res" style="color:var(--sage)">0</div><div class="lbl">Resolved</div></div>
    </div>

    <div class="controls">
      <div class="filter-btns">
        <button class="filter-btn active" data-filter="all"      onclick="setFilter('all')">All</button>
        <button class="filter-btn"        data-filter="open"     onclick="setFilter('open')">Open</button>
        <button class="filter-btn"        data-filter="progress" onclick="setFilter('progress')">In Progress</button>
        <button class="filter-btn"        data-filter="resolved" onclick="setFilter('resolved')">Resolved</button>
      </div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input id="search-input" type="text" placeholder="Search roll no., name, subject" oninput="renderTickets()" />
      </div>
    </div>

    <div id="ticket-list"></div>
  </main>
</div>

<script>
const ADMIN_PIN = 'ADMIN2026';
const STORAGE_KEY_TICKETS = 'chd-tickets';

let tickets = [];
let currentFilter = 'all';
let expandedId = null;
let editState = {};

function loadData(){
  try { const r = localStorage.getItem(STORAGE_KEY_TICKETS); if(r) tickets = JSON.parse(r); } catch(e){}
}
function saveTickets(){ localStorage.setItem(STORAGE_KEY_TICKETS, JSON.stringify(tickets)); }

function show(id){ document.getElementById(id).classList.remove('hidden'); }
function hide(id){ document.getElementById(id).classList.add('hidden'); }
function escHTML(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtRel(iso){
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff/60000);
  if(m<1) return 'just now';
  if(m<60) return m+'m ago';
  const h = Math.floor(m/60);
  if(h<24) return h+'h ago';
  const d = Math.floor(h/24);
  if(d<30) return d+'d ago';
  return new Date(iso).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
}

function submitPin(){
  const pin = document.getElementById('pin-input').value;
  const err = document.getElementById('pin-error');
  if(!pin){ err.textContent='Enter the admin PIN.'; show('pin-error'); return; }
  if(pin !== ADMIN_PIN){ err.textContent='Incorrect PIN.'; show('pin-error'); return; }
  hide('auth-screen');
  show('admin-screen');
  renderTickets();
}

function logout(){
  hide('admin-screen');
  show('auth-screen');
  document.getElementById('pin-input').value = '';
  hide('pin-error');
}

function setFilter(f){
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === f);
  });
  renderTickets();
}

function getFiltered(){
  const q = (document.getElementById('search-input')?.value || '').toLowerCase().trim();
  return tickets
    .filter(t => currentFilter === 'all' ? true : t.status === currentFilter)
    .filter(t => {
      if(!q) return true;
      return (t.rollNumber||'').toLowerCase().includes(q)
          || (t.studentName||'').toLowerCase().includes(q)
          || (t.subject||'').toLowerCase().includes(q);
    })
    .sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
}

function stampHTML(status){
  const l = {open:'Open',progress:'In Progress',resolved:'Resolved'};
  return `<span class="stamp stamp-${status}">${l[status]||status}</span>`;
}

function toggleRow(id){
  expandedId = expandedId === id ? null : id;
  const t = tickets.find(x=>x.id===id);
  if(t && !editState[id]){
    editState[id] = { status: t.status, note: t.adminNote||'' };
  }
  renderTickets();
}

function saveTicket(id){
  const s = editState[id];
  if(!s) return;
  tickets = tickets.map(t => t.id===id
    ? {...t, status: s.status, adminNote: s.note, updatedAt: new Date().toISOString()}
    : t);
  saveTickets();
  const saved = document.getElementById('saved-'+id);
  if(saved){ saved.style.display='inline'; setTimeout(()=>{ if(saved) saved.style.display='none'; }, 2000); }
  renderStats();
}

function onStatusChange(id, val){
  if(!editState[id]) editState[id] = {};
  editState[id].status = val;
}
function onNoteChange(id, val){
  if(!editState[id]) editState[id] = {};
  editState[id].note = val;
}

function renderStats(){
  document.getElementById('cnt-all').textContent  = tickets.length;
  document.getElementById('cnt-open').textContent = tickets.filter(t=>t.status==='open').length;
  document.getElementById('cnt-prog').textContent = tickets.filter(t=>t.status==='progress').length;
  document.getElementById('cnt-res').textContent  = tickets.filter(t=>t.status==='resolved').length;
}

function renderTickets(){
  renderStats();
  const filtered = getFiltered();
  const list = document.getElementById('ticket-list');
  if(!list) return;

  if(filtered.length === 0){
    list.innerHTML = `<div class="empty-state">No tickets match this view.</div>`;
    return;
  }

  list.innerHTML = filtered.map(t => {
    const exp = expandedId === t.id;
    const es  = editState[t.id] || { status: t.status, note: t.adminNote||'' };

    const bodyHTML = exp ? `
      <div class="ticket-body ticket-stub">
        <p class="desc">${escHTML(t.description)}</p>
        <div class="edit-grid">
          <div>
            <label class="field-label">Status</label>
            <select onchange="onStatusChange('${t.id}', this.value)">
              <option value="open"     ${es.status==='open'?'selected':''}>Open</option>
              <option value="progress" ${es.status==='progress'?'selected':''}>In Progress</option>
              <option value="resolved" ${es.status==='resolved'?'selected':''}>Resolved</option>
            </select>
          </div>
          <div>
            <label class="field-label">Response to student (optional)</label>
            <input type="text" value="${escHTML(es.note)}" placeholder="e.g. Forwarded to exam cell"
              oninput="onNoteChange('${t.id}', this.value)" />
          </div>
        </div>
        <div class="edit-actions">
          <button class="btn-primary" onclick="saveTicket('${t.id}')">Save changes</button>
          <span id="saved-${t.id}" style="display:none;font-size:13px;color:var(--sage)">✓ Saved</span>
        </div>
      </div>` : '';

    return `<div class="ticket-row">
      <button class="ticket-toggle" onclick="toggleRow('${t.id}')">
        <div class="info-grid">
          <div class="roll-no">${escHTML(t.rollNumber)}</div>
          <div>
            <div class="subj">${escHTML(t.subject)}</div>
            <div class="sub-meta">${escHTML(t.studentName)} · ${escHTML(t.category)} · ${fmtRel(t.createdAt)}</div>
          </div>
        </div>
        ${stampHTML(t.status)}
      </button>
      ${bodyHTML}
    </div>`;
  }).join('');
}

loadData();
</script>
</body>
</html>
